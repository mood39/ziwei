<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數算命 - 飛星派</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#141820">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="紫微斗數">
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<style>
  :root{
    --red:#c0392b;
    --red-dark:#96281b;
    --gray:#8a8a8a;
    --line:#333;
    --orange:#f6c453;
    --green:#c6e6b3;
    --paper:#fdfaf3;
  }
  *{box-sizing:border-box;}
  body{
    font-family:"Noto Serif TC","PMingLiU","Microsoft JhengHei",serif;
    background:#eee7d8;
    margin:0;
    padding:24px 12px 60px;
    color:#222;
  }
  h1{text-align:center;font-size:20px;letter-spacing:4px;margin:0 0 20px;color:var(--red-dark);}

  /* ---------- 表單 ---------- */
  #formWrap{
    max-width:480px;
    margin:0 auto 30px;
    border:1px solid var(--line);
    background:#fff;
  }
  .formHeader{
    background:var(--red);
    color:#fff;
    text-align:center;
    font-weight:bold;
    padding:8px;
    font-size:16px;
    letter-spacing:2px;
  }
  .formSub{
    background:var(--gray);
    color:#fff;
    text-align:center;
    padding:5px;
    font-size:13px;
  }
  .row{
    display:flex;
    align-items:center;
    border-bottom:1px solid #ddd;
    padding:8px 12px;
    font-size:14px;
  }
  .row label.rowLabel{width:90px;flex-shrink:0;color:#444;}
  .row select, .row input[type=number]{
    padding:4px 6px;font-size:14px;border:1px solid #bbb;
  }
  .row input[type=number]{width:100px;}
  .radioGroup label{margin-right:16px;}
  #submitBtn{
    display:block;width:100%;padding:10px;background:var(--red);color:#fff;
    border:none;font-size:16px;letter-spacing:4px;cursor:pointer;
  }
  #submitBtn:hover{background:var(--red-dark);}
  #leapRow{display:none;}
  .errBox{color:var(--red);text-align:center;padding:10px;font-size:13px;display:none;}

  /* ---------- 常用命盤 ---------- */
  #profileSection{border-bottom:2px solid var(--line);}
  .profileHeader{
    background:#666;color:#fff;text-align:center;padding:6px;font-size:14px;letter-spacing:2px;
  }
  #profileList{max-height:220px;overflow-y:auto;}
  .profileItem{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 12px;border-bottom:1px solid #eee;font-size:14px;gap:8px;
  }
  .profileItem .pInfo{flex:1;min-width:0;}
  .profileItem .pName{font-weight:bold;color:var(--red-dark);}
  .profileItem .pBirth{color:#777;font-size:12.5px;}
  .profileItem button{
    padding:4px 10px;font-size:13px;border:1px solid #bbb;background:#fff;cursor:pointer;
    border-radius:3px;white-space:nowrap;
  }
  .profileItem button.pChart{background:var(--red);color:#fff;border-color:var(--red);}
  .profileItem button:hover{opacity:0.85;}
  .profileEmpty{padding:10px;text-align:center;color:#999;font-size:13px;}
  #saveBtn{
    display:block;width:100%;padding:8px;background:#3a7d44;color:#fff;
    border:none;font-size:14px;letter-spacing:2px;cursor:pointer;border-top:1px solid #fff;
  }
  #saveBtn:hover{background:#2e6336;}

  /* ---------- 命盤 ---------- */
  #chartWrap{max-width:840px;margin:0 auto;display:none;}
  #gridScale{overflow:hidden;}
  .grid{
    display:grid;
    width:840px;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    border:2px solid var(--line);
    background:var(--line);
    gap:1px;
    transform-origin:0 0;
  }
  .cell{
    background:var(--paper);
    height:230px;
    overflow:hidden;
    position:relative;
  }
  .cell.soul{background:var(--orange);}
  .cell.sanfang{background:var(--green);}
  .cellContent{
    padding:5px 6px;
    font-size:16px; /* 由 JS 動態調整此基準值，其餘用 em 相對縮放 */
    line-height:1.25;
  }
  .palaceTitle{
    font-weight:bold;font-size:1em;margin-bottom:0.1em;color:#000;
    line-height:1.15;
  }
  .palaceTitle .stemzhi{
    color:#cb9965;font-size:calc(1.125em + 2px);font-weight:bold;
  }
  .palaceTitle .palaceName{
    color:var(--red-dark);font-size:calc(1.125em + 4px);font-weight:bold;
  }
  .limitLine{font-size:1em;color:#333;margin-bottom:0.1em;}
  .direction{font-size:0.9375em;color:#3a7d44;margin-bottom:0.15em;}
  .limitLine span.val{color:#2255aa;text-decoration:underline;}
  .stars{margin-top:0.15em;}
  .starLine{margin-bottom:0.05em;}
  .starName.major{color:#c0392b;font-size:1.125em;font-weight:bold;}
  .starName.minor{color:#1c5fa8;font-size:1.0625em;font-weight:bold;}
  .bright{font-size:0.875em;color:#555;margin-left:0.1em;}
  .sihua{
    display:inline-block;border-radius:2px;padding:0 0.2em;margin-left:0.15em;
    color:#fff;font-size:0.8125em;font-weight:bold;
  }
  .sihua.祿{background:#2e8b3d;}
  .sihua.權{background:#1c5fa8;}
  .sihua.科{background:#a87b1c;}
  .sihua.忌{background:#b32d2d;}
  .minorStars{color:#1c5fa8;font-size:1.0625em;font-weight:bold;margin-top:0.1em;}
  .adjStars{color:#555;font-size:1em;margin-top:0.1em;}

  .center{
    grid-column:2 / span 2;
    grid-row:2 / span 2;
    background:#fff;
    display:flex;flex-direction:column;justify-content:center;
    padding:8px;font-size:13px;line-height:1.8;
  }
  .center div b{color:var(--red-dark);}

  .note{max-width:840px;margin:16px auto;font-size:12px;color:#666;line-height:1.8;}

  #yearFlowWrap{
    max-width:840px;margin:16px auto 0;background:#fff;border:1px solid var(--line);
  }
  .yfHeader{background:var(--red);color:#fff;text-align:center;font-weight:bold;padding:8px;font-size:16px;letter-spacing:2px;}
  .yfRow{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;border-bottom:1px solid #ddd;}
  .yfRow input{padding:5px 8px;font-size:14px;border:1px solid #bbb;}
  .yfRow button{padding:6px 16px;background:var(--red);color:#fff;border:none;font-size:14px;cursor:pointer;}
  .yfRow button:hover{background:var(--red-dark);}
  #yfResult{padding:14px 16px;font-size:14px;line-height:1.9;}
  #yfResult .yfSummary{margin-bottom:14px;}
  #yfResult .yfSummary b{color:var(--red-dark);}
  .monthGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .monthCard{border:1px solid #ccc;padding:8px;font-size:13px;line-height:1.6;background:#fdfaf3;}
  .monthCard.hit{background:#fff2d9;border-color:var(--red);}
  .monthCard .mTitle{font-weight:bold;margin-bottom:4px;font-size:14px;color:#000;}
  .monthCard .mSub{color:#555;font-size:12.5px;margin-bottom:4px;}
  .monthCard .leapTag{
    display:inline-block;background:#8a6d3b;color:#fff;border-radius:2px;
    padding:0 4px;font-size:11px;margin-left:4px;font-weight:normal;
  }
  .monthCard .mHitTag{
    display:inline-block;color:#fff;background:var(--red);border-radius:2px;
    padding:0 4px;font-size:12px;margin-left:4px;
  }
  .monthCard .mDays{color:#2255aa;margin-top:3px;}
  .yfTextBox{
    border:1px solid #ddd;background:#fdfaf3;padding:10px 14px;margin-bottom:14px;
    font-size:14px;line-height:1.9;
  }
  .yfTextTitle{font-weight:bold;color:var(--red-dark);margin-bottom:6px;font-size:14px;}
  .yfTextBox .pLine{margin-bottom:4px;}
  .yfTextBox .pLine b{color:var(--red-dark);}
  .monthCard .mBright{margin-top:3px;color:#333;}
  .mBright .bMiao,.mBright .bWang,.mBright .bXian{
    display:inline-block;border-radius:2px;padding:0 4px;margin-right:2px;
    color:#fff;font-size:12px;font-weight:bold;
  }
  .mBright .bMiao{background:#a87b1c;}
  .mBright .bWang{background:#c0392b;}
  .mBright .bXian{background:#777;}
  #specialPatterns{
    max-width:840px;margin:16px auto 0;background:#fff;border:1px solid var(--line);
    padding:14px 18px;font-size:14px;line-height:1.9;
  }
  #specialPatterns h2{font-size:16px;margin:0 0 10px;color:var(--red-dark);}
  #specialPatterns ol{margin:0;padding-left:1.5em;}
  #specialPatterns li{margin-bottom:5px;color:#333;}
  #specialPatterns li.redbold{color:#b32d2d;font-weight:bold;}
  #specialPatterns .empty{color:#999;}

  #radarBox{
    max-width:840px;margin:16px auto 0;background:#fff;border:1px solid var(--line);
    padding:14px 18px;
  }
  #radarBox h2{font-size:16px;margin:0 0 10px;color:var(--red-dark);}
  .radarLegend{text-align:center;font-size:13px;margin:6px 0;}
  .radarLegend .lg{display:inline-block;width:14px;height:14px;vertical-align:middle;margin-right:4px;border-radius:2px;}
  .radarLegend .lgNatal{background:rgba(192,57,43,0.6);border:2px solid #c0392b;}
  .radarLegend .lgFlow{background:rgba(28,95,168,0.5);border:2px dashed #1c5fa8;}
  .radarTable{margin:8px auto 0;border-collapse:collapse;font-size:13px;}
  .radarTable th,.radarTable td{border:1px solid #ddd;padding:4px 10px;text-align:center;}
  .radarTable th{background:#f5f0e6;}
  .radarNote{color:#999;font-size:11.5px;line-height:1.7;margin:10px 0 0;}
  .palaceScore{color:#a87b1c;font-size:0.9375em;margin-bottom:0.1em;letter-spacing:1px;}
  .palaceScore span{color:#999;font-size:0.8em;letter-spacing:0;}
  #backBtn{display:block;margin:16px auto 0;padding:8px 20px;background:#555;color:#fff;border:none;cursor:pointer;}

  @media (max-width:720px){
    .monthGrid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<h1>紫 微 斗 數 算 命 — 飛星派（中州派安星法）</h1>

<div id="formWrap">
  <div class="formHeader">紫微斗數算命</div>

  <div id="profileSection">
    <div class="profileHeader">常用命盤</div>
    <div id="profileList"></div>
  </div>

  <div class="formSub">請輸入您的生日</div>

  <div class="row">
    <label class="rowLabel">姓名</label>
    <input type="text" id="nameInput" placeholder="儲存命盤時使用（選填）" style="flex:1;padding:4px 6px;font-size:14px;border:1px solid #bbb;">
  </div>

  <div class="row">
    <label class="rowLabel">性別</label>
    <span class="radioGroup">
      <label><input type="radio" name="gender" value="男" checked>男</label>
      <label><input type="radio" name="gender" value="女">女</label>
    </span>
  </div>

  <div class="row">
    <label class="rowLabel">曆制</label>
    <select id="calType">
      <option value="solar">國曆</option>
      <option value="lunar">農曆</option>
    </select>
    <span style="margin-left:8px;">出生年</span>
    <input type="number" id="yearInput" min="1" max="3400" value="1990" style="margin-left:6px;">
  </div>

  <div class="row">
    <label class="rowLabel">出生月</label>
    <select id="monthInput"></select>
  </div>

  <div class="row">
    <label class="rowLabel">出生日</label>
    <select id="dayInput"></select>
  </div>

  <div class="row" id="leapRow">
    <label class="rowLabel">閏月</label>
    <label><input type="checkbox" id="leapInput"> 這是閏月</label>
  </div>

  <div class="row">
    <label class="rowLabel">時辰</label>
    <select id="hourInput"></select>
  </div>

  <div class="errBox" id="errBox"></div>
  <button id="submitBtn">開 始 排 盤</button>
  <button id="saveBtn">儲 存 到 常 用 命 盤</button>
</div>

<div id="chartWrap">
  <div id="gridScale"><div class="grid" id="grid"></div></div>
  <div id="specialPatterns"></div>
  <div id="radarBox">
    <h2>六大面向能量圖</h2>
    <div id="radarContent"></div>
  </div>

  <div id="yearFlowWrap">
    <div class="yfHeader">流年運勢查詢</div>
    <div class="yfRow">
      <label>選擇年份（西元）：</label>
      <input type="number" id="yfYearInput" min="1" max="3400" style="width:100px;">
      <button id="yfBtn">查詢</button>
    </div>
    <div id="yfResult"></div>
  </div>

  <div class="note">
    說明：本命盤核心排盤（十二宮、十四主星、輔星、五行局、大限）採用開源函式庫
    <b>iztro</b>（MIT授權）並設定為中州派（zhongzhou）安星演算法；命主、身主、小限、生年四化
    另以固定口訣表運算比對，不依賴函式庫預設值。命理排盤流派眾多，細節寫法各家略有差異，
    重大決策仍建議與專業命理師核對。
  </div>
  <button id="backBtn">重新輸入</button>
</div>

<script>
/* ---------------- 十天干四化表（標準，各派通用） ---------------- */
const SIHUA_TABLE = {
  '甲': {'廉貞':'祿','破軍':'權','武曲':'科','太陽':'忌'},
  '乙': {'天機':'祿','天梁':'權','紫微':'科','太陰':'忌'},
  '丙': {'天同':'祿','天機':'權','文昌':'科','廉貞':'忌'},
  '丁': {'太陰':'祿','天同':'權','天機':'科','巨門':'忌'},
  '戊': {'貪狼':'祿','太陰':'權','右弼':'科','天機':'忌'},
  '己': {'武曲':'祿','貪狼':'權','天梁':'科','文曲':'忌'},
  '庚': {'太陽':'祿','武曲':'權','太陰':'科','天同':'忌'},
  '辛': {'巨門':'祿','太陽':'權','文曲':'科','文昌':'忌'},
  '壬': {'天梁':'祿','紫微':'權','左輔':'科','武曲':'忌'},
  '癸': {'破軍':'祿','巨門':'權','太陰':'科','貪狼':'忌'}
};

const PALACE_ORDER = ['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','交友','事業','田宅','福德','父母'];
// iztro 內建宮名（部分版本用「僕役」「官祿」），統一做名稱對照
const NAME_ALIAS = {'僕役':'交友','官祿':'事業'};

// 供「流年運勢查詢」使用的命盤全域參照（每次排盤後更新）
let currentCellsByZhi = null;
let currentMeta = null; // {birthYear, smallLimitMap}

// 雜曜白名單（依指定順序），其餘星曜（十二神、乙級星等）一律不顯示
const ADJ_WHITELIST = [
  '天空','天哭','天虛','龍池','鳳閣','紅鸞','天喜','孤辰','寡宿',
  '蜚廉','破碎','華蓋','咸池','天德','月德','天才','天壽','三台','八座','恩光','天貴'
];
function filterAdjStars(adjArr){
  if(!adjArr) return [];
  const nameSet = {};
  adjArr.forEach(s=>{ nameSet[s.name]=s; });
  return ADJ_WHITELIST.filter(n=>nameSet[n]).map(n=>nameSet[n]);
}

const ZHI_ORDER = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const STEM_ORDER = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const STEM_YINYANG = {'甲':1,'丙':1,'戊':1,'庚':1,'壬':1,'乙':0,'丁':0,'己':0,'辛':0,'癸':0}; // 1=陽 0=陰

// 命主歌訣：依命宮地支查出命主星（固定表，不依賴函式庫）
const SOUL_MASTER = {
  '子':'貪狼','丑':'巨門','寅':'祿存','卯':'文曲','辰':'廉貞','巳':'武曲',
  '午':'破軍','未':'武曲','申':'廉貞','酉':'文曲','戌':'祿存','亥':'巨門'
};
// 身主歌訣：依生年地支查出身主星（固定表，不依賴函式庫）
const BODY_MASTER = {
  '子':'火星','丑':'天相','寅':'天梁','卯':'天同','辰':'文昌','巳':'天機',
  '午':'鈴星','未':'天機','申':'文昌','酉':'天同','戌':'天梁','亥':'天相'
};
// 亮度對照：得、利 一律顯示為旺；不 顯示為陷；其餘（廟旺平陷）維持原樣
const BRIGHT_MAP = {'廟':'廟','旺':'旺','得':'旺','利':'旺','平':'平','不':'陷','陷':'陷'};

// 十二宮方位與卦位（依後天八卦方位）
const BRANCH_DIRECTION = {
  '子':'北方坎','丑':'東北艮','寅':'東北艮','卯':'東方震',
  '辰':'東南巽','巳':'東南巽','午':'南方離','未':'西南坤',
  '申':'西南坤','酉':'西方兌','戌':'西北乾','亥':'西北乾'
};

/* ---------------- 表單初始化 ---------------- */
const monthSel = document.getElementById('monthInput');
const daySel = document.getElementById('dayInput');
const hourSel = document.getElementById('hourInput');
const calType = document.getElementById('calType');
const leapRow = document.getElementById('leapRow');

const HOUR_LABELS = [
  ['子','23:00~00:59'],['丑','01:00~02:59'],['寅','03:00~04:59'],['卯','05:00~06:59'],
  ['辰','07:00~08:59'],['巳','09:00~10:59'],['午','11:00~12:59'],['未','13:00~14:59'],
  ['申','15:00~16:59'],['酉','17:00~18:59'],['戌','19:00~20:59'],['亥','21:00~22:59']
];

function fillSelect(sel, n, offset=1){
  sel.innerHTML='';
  for(let i=offset; i<n+offset; i++){
    const o=document.createElement('option'); o.value=i; o.textContent=i;
    sel.appendChild(o);
  }
}
fillSelect(monthSel,12);
fillSelect(daySel,31);
HOUR_LABELS.forEach((h,i)=>{
  const o=document.createElement('option');
  o.value=i;
  o.textContent = h[0]+'時 '+h[1];
  hourSel.appendChild(o);
});

calType.addEventListener('change', ()=>{
  leapRow.style.display = calType.value==='lunar' ? 'flex' : 'none';
  fillSelect(daySel, calType.value==='lunar' ? 30 : 31);
});

/* ---------------- 送出排盤 ---------------- */
/* ---------------- 讀取/寫入表單 ---------------- */
function readForm(){
  return {
    name: document.getElementById('nameInput').value.trim(),
    gender: document.querySelector('input[name=gender]:checked').value,
    calType: calType.value,
    year: parseInt(document.getElementById('yearInput').value,10),
    month: parseInt(monthSel.value,10),
    day: parseInt(daySel.value,10),
    leap: document.getElementById('leapInput').checked,
    hourIndex: parseInt(hourSel.value,10)
  };
}
function writeForm(d){
  document.getElementById('nameInput').value = d.name || '';
  document.querySelectorAll('input[name=gender]').forEach(r=>{ r.checked = (r.value===d.gender); });
  calType.value = d.calType;
  calType.dispatchEvent(new Event('change'));
  document.getElementById('yearInput').value = d.year;
  monthSel.value = d.month;
  daySel.value = d.day;
  document.getElementById('leapInput').checked = !!d.leap;
  hourSel.value = d.hourIndex;
}

/* ---------------- 排盤主流程 ---------------- */
function chartFromData(d){
  const errBox = document.getElementById('errBox');
  errBox.style.display='none';
  try{
    if(!d.year || d.year<1 || d.year>3400) throw new Error('請輸入正確的出生年');

    if (iztro.astro.config) {
      iztro.astro.config({ algorithm: 'zhongzhou' });
    }

    const dateStr = `${d.year}-${d.month}-${d.day}`;
    let astrolabe;
    if(d.calType==='lunar'){
      astrolabe = iztro.astro.byLunar(dateStr, d.hourIndex, d.gender, d.leap, true, 'zh-TW');
    }else{
      astrolabe = iztro.astro.bySolar(dateStr, d.hourIndex, d.gender, true, 'zh-TW');
    }
    document.getElementById('formWrap').style.display='none';
    document.getElementById('chartWrap').style.display='block';
    renderChart(astrolabe, d.gender);
    return true;
  }catch(e){
    console.error(e);
    errBox.textContent = '排盤失敗：'+e.message+'（請確認網路可載入 iztro 函式庫，並檢查日期是否存在）';
    errBox.style.display='block';
    document.getElementById('formWrap').style.display='block';
    document.getElementById('chartWrap').style.display='none';

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- 小限計算（傳統安小限訣） ----------------
   寅午戌年生人，小限從辰宮起1歲；申子辰年生人，小限從戌宮起1歲；
   巳酉丑年生人，小限從未宮起1歲；亥卯未年生人，小限從丑宮起1歲。
   陽男陰女順行，陰男陽女逆行。 */
function getSmallLimitStartZhi(yearZhi){
  const g1=['寅','午','戌'], g2=['申','子','辰'], g3=['巳','酉','丑'], g4=['亥','卯','未'];
  if(g1.includes(yearZhi)) return '辰';
  if(g2.includes(yearZhi)) return '戌';
  if(g3.includes(yearZhi)) return '未';
  return '丑';
}
function buildSmallLimitMap(yearGan, yearZhi, gender){
  const startZhi = getSmallLimitStartZhi(yearZhi);
  const startIdx = ZHI_ORDER.indexOf(startZhi);
  // 小限順逆規則與大限不同：不分陰陽，一律男順女逆
  const forward = (gender==='男');
  const map = {}; // zhiIndex -> [ages...]
  for(let i=0;i<12;i++) map[i]=[];
  for(let age=1; age<=110; age++){
    const step = age-1;
    const idx = forward ? (startIdx+step)%12 : ((startIdx-step)%12+12)%12;
    map[idx].push(age);
  }
  return map;
}

/* ---------------- 取得宮位的地支索引 ---------------- */
function zhiIndex(zhi){ return ZHI_ORDER.indexOf(zhi); }

/* ---------------- 星耀彙整（含亮度、生年四化標記） ---------------- */
function starLineHtml(star, cls){
  let html = `<span class="starName ${cls}">${star.name}</span>`;
  if(star.brightness){
    const b = BRIGHT_MAP[star.brightness] || star.brightness;
    html += `<span class="bright">${b}</span>`;
  }
  if(star.mutagen){
    html += `<span class="sihua ${star.mutagen}">${star.mutagen}</span>`;
  }
  return html;
}

/* ---------------- 整盤等比縮放（手機/窄視窗時將840px命盤縮小塞進螢幕） ---------------- */
function scaleChart(){
  const wrap = document.getElementById('gridScale');
  const grid = document.getElementById('grid');
  if(!wrap || !grid || !grid.children.length) return;
  const avail = wrap.clientWidth;
  const scale = Math.min(1, avail / 840);
  grid.style.transform = scale < 1 ? `scale(${scale})` : 'none';
  wrap.style.height = (grid.offsetHeight * scale) + 'px';
}
window.addEventListener('resize', scaleChart);

/* ---------------- 自動縮放：先算出每格所需字體，取最小值統一套用全盤 ---------------- */
function computeFitFontSize(cellEl){
  const content = cellEl.querySelector('.cellContent');
  if(!content) return 16;
  const maxHeight = cellEl.clientHeight * 0.75;
  let fontSize = 16;
  content.style.fontSize = fontSize + 'px';
  let guard = 0;
  while(content.scrollHeight > maxHeight && fontSize > 7 && guard < 60){
    fontSize -= 0.5;
    content.style.fontSize = fontSize + 'px';
    guard++;
  }
  return fontSize;
}
function applyUniformFontSize(cellEls){
  const sizes = cellEls.map(computeFitFontSize);
  const uniformSize = Math.min(...sizes);
  cellEls.forEach(cellEl=>{
    const content = cellEl.querySelector('.cellContent');
    if(content) content.style.fontSize = uniformSize + 'px';
  });
}

/* ---------------- 主渲染函式 ---------------- */
function renderChart(astrolabe, gender){
  const grid = document.getElementById('grid');
  grid.innerHTML='';

  const palaces = astrolabe.palaces;

  const soulPalace = palaces.find(p=>p.name==='命宮');
  const soulZhiIdx = soulPalace ? zhiIndex(soulPalace.earthlyBranch) : null;
  const sanfangIdx = soulZhiIdx===null ? [] : [
    soulZhiIdx, (soulZhiIdx+4)%12, (soulZhiIdx+8)%12, (soulZhiIdx+6)%12
  ];

  const cellsByZhi = new Array(12).fill(null);
  palaces.forEach(p=>{
    cellsByZhi[zhiIndex(p.earthlyBranch)] = p;
  });

  let yearGan, yearZhi;
  try{
    const parts = astrolabe.chineseDate.split(' ');
    yearGan = parts[0][0]; yearZhi = parts[0][1];
  }catch(e){
    yearGan='甲'; yearZhi='子';
  }
  const smallLimitMap = buildSmallLimitMap(yearGan, yearZhi, gender);

  const soulMasterStar = soulPalace ? (SOUL_MASTER[soulPalace.earthlyBranch] || '?') : '?';
  const bodyMasterStar = BODY_MASTER[yearZhi] || '?';

  const layout = [
    [1,1,'巳'],[1,2,'午'],[1,3,'未'],[1,4,'申'],
    [2,1,'辰'],                          [2,4,'酉'],
    [3,1,'卯'],                          [3,4,'戌'],
    [4,1,'寅'],[4,2,'丑'],[4,3,'子'],[4,4,'亥']
  ];

  const cellEls = [];
  const cellElsByZhi = new Array(12).fill(null);

  layout.forEach(([row,col,zhi])=>{
    const idx = zhiIndex(zhi);
    const p = cellsByZhi[idx];
    const div = document.createElement('div');
    div.className='cell';
    div.style.gridRow=row; div.style.gridColumn=col;
    if(p){
      const displayName = NAME_ALIAS[p.name] || p.name;
      if(displayName==='命宮') div.classList.add('soul');
      else if(sanfangIdx.includes(idx)) div.classList.add('sanfang');

      let html = `<div class="palaceTitle"><span class="stemzhi">${p.heavenlyStem}${p.earthlyBranch}</span><span class="palaceName">【${displayName}${p.isBodyPalace?'-身宮':''}】</span></div>`;
      html += `<div class="direction">${BRANCH_DIRECTION[p.earthlyBranch]||''}</div>`;

      if(p.decadal && p.decadal.range){
        html += `<div class="limitLine">大限：<span class="val">${p.decadal.range[0]}-${p.decadal.range[1]}</span></div>`;
      }
      const ages = smallLimitMap[idx] || [];
      if(ages.length){
        html += `<div class="limitLine">小限：<span class="val">${ages.slice(0,7).join(' ')}</span></div>`;
      }

      const majors = (p.majorStars||[]).filter(s=>s.type==='major');
      const others = (p.majorStars||[]).filter(s=>s.type!=='major');
      const minors = p.minorStars||[];
      const adj = filterAdjStars(p.adjectiveStars);

      html += '<div class="stars">';
      majors.forEach(s=>{ html += `<div class="starLine">${starLineHtml(s, 'major')}</div>`; });
      others.forEach(s=>{ html += `<div class="starLine">${starLineHtml(s, 'minor')}</div>`; });
      html += '</div>';

      if(minors.length){
        html += `<div class="minorStars">${minors.map(s=>s.name+(s.mutagen?`<span class="sihua ${s.mutagen}">${s.mutagen}</span>`:'')).join('、')}</div>`;
      }
      if(adj.length){
        html += `<div class="adjStars">${adj.map(s=>s.name).join('、')}</div>`;
      }

      div.innerHTML = `<div class="cellContent">${html}</div>`;
      cellEls.push(div);
      cellElsByZhi[idx] = div;
    }
    grid.appendChild(div);
  });

  const sihuaEntries = SIHUA_TABLE[yearGan] || {};
  const sihuaText = Object.keys(sihuaEntries).map(star=>star+'化'+sihuaEntries[star]).join('，');

  const center = document.createElement('div');
  center.className='cell center';
  center.style.gridRow='2 / span 2';
  center.style.gridColumn='2 / span 2';
  center.style.height='auto';
  center.innerHTML = `
    <div>陽曆：<b>${astrolabe.solarDate}</b></div>
    <div>農曆：<b>${astrolabe.lunarDate}</b>　${astrolabe.time||''}</div>
    <div>干支：<b>${astrolabe.chineseDate}</b></div>
    <div>五行局：<b>${astrolabe.fiveElementsClass}</b></div>
    <div>生年四化：<b>${sihuaText}</b></div>
    <div>命主：<b>${soulMasterStar}</b>　身主：<b>${bodyMasterStar}</b></div>
    <div>生肖：${astrolabe.zodiac}　星座：${astrolabe.sign}</div>
  `;
  grid.appendChild(center);

  // 特殊命格（含分數歸屬）→ 宮位評分 → 注入星等 → 雷達圖
  const patternResults = renderSpecialPatterns(cellsByZhi, soulZhiIdx, soulPalace);
  const patternArr = patternScoreArray(patternResults);
  currentScoreBase = computeScoreBase(cellsByZhi, patternArr);
  const starIdxAll = buildStarIndex(cellsByZhi);
  currentNatalScores = applySihuaScores(currentScoreBase, starIdxAll, yearGan);

  cellsByZhi.forEach((p,idx)=>{
    const el = cellElsByZhi[idx];
    if(!p || !el) return;
    const sc = currentNatalScores[idx];
    const n = scoreToStars(sc);
    const t = el.querySelector('.palaceTitle');
    if(t) t.insertAdjacentHTML('afterend',
      `<div class="palaceScore">${'★'.repeat(n)}${'☆'.repeat(5-n)} <span>${sc.toFixed(1)}分</span></div>`);
  });

  applyUniformFontSize(cellEls);
  renderRadar(cellsByZhi, currentNatalScores, null, null);
  currentCellsByZhi = cellsByZhi;
  currentMeta = {
    birthYear: parseInt(String(astrolabe.solarDate).split('-')[0], 10),
    smallLimitMap: smallLimitMap
  };

  // 清空前一張命盤的流年查詢結果，並將預設年份帶為今年
  const yfResultBox = document.getElementById('yfResult');
  if(yfResultBox) yfResultBox.innerHTML = '';
  const yfInput = document.getElementById('yfYearInput');
  if(yfInput) yfInput.value = new Date().getFullYear();

  scaleChart();
}

/* ================= 特殊命格判斷 ================= */
function oppositeIdx(i){ return (i+6)%12; }
function isOpposite(i,j){ return oppositeIdx(i)===j; }
function isSameOrOpposite(i,j){ return i===j || isOpposite(i,j); }
function circularDist(i,j){ const d=Math.abs(i-j); return Math.min(d,12-d); }
function isFlanking(i,j){ return circularDist(i,j)===2; }
function normBright(b){ return BRIGHT_MAP[b] || b; }

function buildStarIndex(cellsByZhi){
  const idx = {};
  cellsByZhi.forEach((p,i)=>{
    if(!p) return;
    const all = [...(p.majorStars||[]), ...(p.minorStars||[]), ...(p.adjectiveStars||[])];
    all.forEach(s=>{
      if(!idx[s.name]) idx[s.name]=[];
      idx[s.name].push({
        branchIdx:i,
        ganzhi:p.heavenlyStem+p.earthlyBranch,
        brightness:s.brightness,
        palaceName: NAME_ALIAS[p.name]||p.name,
        isBodyPalace:p.isBodyPalace
      });
    });
  });
  return idx;
}

function middleIdx(i, j){
  if((i+2)%12===j) return (i+1)%12;
  if((j+2)%12===i) return (j+1)%12;
  return null;
}

function renderSpecialPatterns(cellsByZhi, soulZhiIdx, soulPalace){
  const box = document.getElementById('specialPatterns');
  const starIndex = buildStarIndex(cellsByZhi);
  const get = name => (starIndex[name] && starIndex[name][0]) || null;
  const results = []; // {text, redBold, alloc:[{idx,w}]}
  const push = (text, redBold, alloc) => results.push({text, redBold: !!redBold, alloc: alloc||[]});
  // 同宮→全額歸該宮；對宮→兩宮各半
  const allocSO = (a,b) => a.branchIdx===b.branchIdx
      ? [{idx:a.branchIdx,w:1}]
      : [{idx:a.branchIdx,w:0.5},{idx:b.branchIdx,w:0.5}];

  // 亮度條件輔助：無亮度資料的雜曜（如紅鸞、三台、八座）視為通過亮度條件
  function brightOK(occ, allowed){
    if(!occ) return false;
    if(!occ.brightness) return true;
    return allowed.includes(normBright(occ.brightness));
  }
  const MW = ['廟','旺'], PX = ['平','陷'];

  // 1. 貪狼在亥或子，且廟或旺
  { const t = get('貪狼');
    if(t && (t.branchIdx===zhiIndex('亥') || t.branchIdx===zhiIndex('子')) && brightOK(t,MW))
      push('貪狼正桃花，泛水桃花。', false, [{idx:t.branchIdx,w:1}]); }

  // 2. 貪狼跟火星或鈴星同宮，且兩星都旺或廟
  { const t = get('貪狼'), huo = get('火星'), ling = get('鈴星');
    const pairOK = (a,b)=> a && b && a.branchIdx===b.branchIdx && brightOK(a,MW) && brightOK(b,MW);
    if(pairOK(t,huo) || pairOK(t,ling)) push('貪狼火貴格、武官。', false, [{idx:t.branchIdx,w:1}]); }

  // 3. 紅鸞在命宮-身宮，且廟或旺
  { const t = get('紅鸞');
    if(t && soulPalace && soulPalace.isBodyPalace && t.branchIdx===soulZhiIdx && brightOK(t,MW))
      push('貌美紅鸞。', false, [{idx:soulZhiIdx,w:1}]); }

  // 4. 紅鸞在事業、父母、兄弟、交友，且廟或旺
  { const t = get('紅鸞');
    if(t && ['事業','父母','兄弟','交友'].includes(t.palaceName) && brightOK(t,MW))
      push('紅鸞媒妁。', false, [{idx:t.branchIdx,w:1}]); }

  // 5. 左輔跟紫微同宮，且兩星都旺或廟
  { const a = get('左輔'), b = get('紫微');
    if(a && b && a.branchIdx===b.branchIdx && brightOK(a,MW) && brightOK(b,MW))
      push('左輔助紫微。', false, [{idx:a.branchIdx,w:1}]); }

  // 6. 三台跟天府同宮，且兩星都旺或廟
  { const a = get('三台'), b = get('天府');
    if(a && b && a.branchIdx===b.branchIdx && brightOK(a,MW) && brightOK(b,MW))
      push('三台助天府。', false, [{idx:a.branchIdx,w:1}]); }

  // 7. 三台跟八座同宮，且兩星都旺或廟
  { const a = get('三台'), b = get('八座');
    if(a && b && a.branchIdx===b.branchIdx && brightOK(a,MW) && brightOK(b,MW))
      push('三台、八座解厄制化。', false, [{idx:a.branchIdx,w:1}]); }

  // 8. 太陽、太陰隔一宮（分數歸被夾的中間宮）
  { const a = get('太陽'), b = get('太陰');
    if(a && b && isFlanking(a.branchIdx,b.branchIdx)){
      const m = middleIdx(a.branchIdx,b.branchIdx);
      push('日月夾財。', false, m!==null?[{idx:m,w:1}]:[]);
    } }

  // 9. 紫微、天府隔一宮（分數歸被夾的中間宮）
  { const a = get('紫微'), b = get('天府');
    if(a && b && isFlanking(a.branchIdx,b.branchIdx)){
      const m = middleIdx(a.branchIdx,b.branchIdx);
      push('紫府夾權。', false, m!==null?[{idx:m,w:1}]:[]);
    } }

  // 10. 天魁、天鉞隔一宮（分數歸被夾的中間宮）
  { const a = get('天魁'), b = get('天鉞');
    if(a && b && isFlanking(a.branchIdx,b.branchIdx)){
      const m = middleIdx(a.branchIdx,b.branchIdx);
      push('魁鉞夾貴。', false, m!==null?[{idx:m,w:1}]:[]);
    } }

  // 11. 擎羊、陀羅隔一宮（凶，扣分歸被夾的中間宮）
  { const a = get('擎羊'), b = get('陀羅');
    if(a && b && isFlanking(a.branchIdx,b.branchIdx)){
      const m = middleIdx(a.branchIdx,b.branchIdx);
      push('羊陀夾殺。', true, m!==null?[{idx:m,w:1}]:[]);
    } }

  // 12. 七殺在命宮-身宮，且平或陷
  { const t = get('七殺');
    if(t && soulPalace && soulPalace.isBodyPalace && t.branchIdx===soulZhiIdx && brightOK(t,PX) && t.brightness)
      push('七殺臨身（宮）終不美。', true, [{idx:soulZhiIdx,w:1}]); }

  // 14. 廉貞、貪狼同宮或對宮，且兩星都平或陷
  { const a = get('廉貞'), b = get('貪狼');
    if(a && b && isSameOrOpposite(a.branchIdx,b.branchIdx) &&
       a.brightness && b.brightness && brightOK(a,PX) && brightOK(b,PX))
      push('半空折翅、天羅地網。', true, allocSO(a,b)); }

  // 15. 廉貞、七殺同宮或對宮，且兩星都平或陷
  { const a = get('廉貞'), b = get('七殺');
    if(a && b && isSameOrOpposite(a.branchIdx,b.branchIdx) &&
       a.brightness && b.brightness && brightOK(a,PX) && brightOK(b,PX))
      push('半路死亡。', true, allocSO(a,b)); }

  // 16. 廉貞、破軍同宮或對宮，且兩星都平或陷
  { const a = get('廉貞'), b = get('破軍');
    if(a && b && isSameOrOpposite(a.branchIdx,b.branchIdx) &&
       a.brightness && b.brightness && brightOK(a,PX) && brightOK(b,PX))
      push('水中做塚、橫禍、意外。', true, allocSO(a,b)); }

  // 17. 太陽、太陰同時陷
  { const a = get('太陽'), b = get('太陰');
    if(a && b && normBright(a.brightness)==='陷' && normBright(b.brightness)==='陷')
      push('日月反背、披星戴月、固執。', true, allocSO(a,b)); }

  // 18. 武曲、七殺同宮或對宮
  { const a = get('武曲'), b = get('七殺');
    if(a && b && isSameOrOpposite(a.branchIdx,b.branchIdx))
      push('曲殺連珠、易孤單，適離鄉發跡，適任武職大利。任商勞多功少。', true, allocSO(a,b)); }

  // 19. 紫微坐垣格（紫微宮與朝斗星宮各半）
  { const FOUR_SPOTS = [['巳','己'],['申','壬'],['寅','丙'],['亥','乙']];
    const validSpots = FOUR_SPOTS.filter(([branch,stem])=>{
      const p = cellsByZhi[zhiIndex(branch)];
      return p && p.heavenlyStem===stem;
    }).map(([branch])=>zhiIndex(branch));
    const zw = get('紫微');
    if(zw && validSpots.includes(zw.branchIdx)){
      const others = ['七殺','貪狼','破軍'].map(get)
        .filter(s=>s && s.branchIdx!==zw.branchIdx && validSpots.includes(s.branchIdx));
      if(others.length)
        push('紫微坐垣，七殺朝斗，位列三台，爵入榮昌。', false,
             [{idx:zw.branchIdx,w:0.5},{idx:others[0].branchIdx,w:0.5}]);
    }
  }

  // 20. 左輔、右弼沒有同宮或對宮（兩星所在宮各扣一半）
  { const a = get('左輔'), b = get('右弼');
    if(a && b && !isSameOrOpposite(a.branchIdx,b.branchIdx))
      push('左輔、右弼，孤星獨守，孤單。', true,
           [{idx:a.branchIdx,w:0.5},{idx:b.branchIdx,w:0.5}]); }

  // 21. 三台、八座沒有同宮或對宮（兩星所在宮各扣一半）
  { const a = get('三台'), b = get('八座');
    if(a && b && !isSameOrOpposite(a.branchIdx,b.branchIdx))
      push('三台、八座，孤星獨守，孤單。', true,
           [{idx:a.branchIdx,w:0.5},{idx:b.branchIdx,w:0.5}]); }

  // 22. 巨門、太陽都旺或廟
  { const a = get('巨門'), b = get('太陽');
    if(a && b){
      const ba = normBright(a.brightness), bb = normBright(b.brightness);
      if((ba==='旺'||ba==='廟') && (bb==='旺'||bb==='廟'))
        push('腰金衣紫巨日格。', false, allocSO(a,b));
    } }

  // 23. 巨門、太陽都平或陷
  { const a = get('巨門'), b = get('太陽');
    if(a && b){
      const ba = normBright(a.brightness), bb = normBright(b.brightness);
      if((ba==='平'||ba==='陷') && (bb==='平'||bb==='陷'))
        push('反覆無常、表裡不一。', true, allocSO(a,b));
    } }

  // 24. 七殺、貪狼、破軍同時有兩個以上在同一宮，且都沒有平或陷
  { const names = ['七殺','貪狼','破軍'];
    const byPalace = {};
    names.forEach(n=>{ const s=get(n); if(s){ (byPalace[s.branchIdx]=byPalace[s.branchIdx]||[]).push(s); } });
    let hitIdx = null;
    Object.keys(byPalace).forEach(k=>{
      const arr = byPalace[k];
      if(arr.length>=2 && arr.every(s=>s.brightness && !PX.includes(normBright(s.brightness)))) hitIdx = parseInt(k,10);
    });
    if(hitIdx!==null) push('雙武星入宮，得業得地，吉。', false, [{idx:hitIdx,w:1}]); }

  // 25. 命宮-身宮或對宮的主星只有廉貞，廉貞廟或旺，且命宮-身宮在申或寅
  { if(soulPalace && soulPalace.isBodyPalace && (soulZhiIdx===zhiIndex('申')||soulZhiIdx===zhiIndex('寅'))){
      const oppIdx = oppositeIdx(soulZhiIdx);
      const soulMajors = (soulPalace.majorStars||[]).filter(s=>s.type==='major').map(s=>s.name);
      const oppPalace = cellsByZhi[oppIdx];
      const oppMajors = oppPalace ? (oppPalace.majorStars||[]).filter(s=>s.type==='major').map(s=>s.name) : [];
      const allMajors = [...new Set([...soulMajors,...oppMajors])];
      const lz = get('廉貞');
      if(allMajors.length===1 && allMajors[0]==='廉貞' && lz && brightOK(lz,MW)){
        const alloc = lz.branchIdx===soulZhiIdx
          ? [{idx:soulZhiIdx,w:1}]
          : [{idx:soulZhiIdx,w:0.5},{idx:lz.branchIdx,w:0.5}];
        push('雄宿朝元格，待財星來會。', false, alloc);
      }
    } }

  // 26. 文曲、太陽同宮或對宮，且兩星都旺或廟
  { const a = get('文曲'), b = get('太陽');
    if(a && b && isSameOrOpposite(a.branchIdx,b.branchIdx) && brightOK(a,MW) && brightOK(b,MW))
      push('日月科祿丑未中，定是方伯公：大官、名人（律師、會計師）。政商關係好。', false, allocSO(a,b)); }

  // 27. 文昌、太陰同宮或對宮，且兩星都旺或廟
  { const a = get('文昌'), b = get('太陰');
    if(a && b && isSameOrOpposite(a.branchIdx,b.branchIdx) && brightOK(a,MW) && brightOK(b,MW))
      push('日月科祿丑未中，定是方伯公：大官、名人（律師、會計師）。政商關係好。', false, allocSO(a,b)); }

  // 28. 太陰在子，且廟或旺
  { const t = get('太陰');
    if(t && t.branchIdx===zhiIndex('子') && brightOK(t,MW))
      push('水澄桂萼格，太陰適官、清官超然。', false, [{idx:t.branchIdx,w:1}]); }

  // 29. 太陰在亥，且廟或旺
  { const t = get('太陰');
    if(t && t.branchIdx===zhiIndex('亥') && brightOK(t,MW)) push('月朗天門。', false, [{idx:t.branchIdx,w:1}]); }

  // 30. 太陽在卯，且廟或旺
  { const t = get('太陽');
    if(t && t.branchIdx===zhiIndex('卯') && brightOK(t,MW)) push('日照雷門。', false, [{idx:t.branchIdx,w:1}]); }

  // 31. 太陰在亥且太陽在卯，且兩星都旺或廟
  { const yin = get('太陰'), yang = get('太陽');
    if(yin && yang && yin.branchIdx===zhiIndex('亥') && yang.branchIdx===zhiIndex('卯') &&
       brightOK(yin,MW) && brightOK(yang,MW))
      push('月朗天門、日照雷門，父母雙全、日月並明、公正平穩。從商日不落。一世榮華。', false,
           [{idx:yin.branchIdx,w:0.5},{idx:yang.branchIdx,w:0.5}]); }

  // 32. 破軍在子或午，且廟或旺
  { const t = get('破軍');
    if(t && (t.branchIdx===zhiIndex('子') || t.branchIdx===zhiIndex('午')) && brightOK(t,MW))
      push('英星入廟、威震邊疆。', false, [{idx:t.branchIdx,w:1}]); }

  // 33. 太陽在午，且廟或旺
  { const t = get('太陽');
    if(t && t.branchIdx===zhiIndex('午') && brightOK(t,MW)) push('日麗中天格。', false, [{idx:t.branchIdx,w:1}]); }

  if(results.length===0){
    box.innerHTML = `<h2>特殊命格</h2><p class="empty">本命盤未觸發上述特殊命格條件。</p>`;
  }else{
    const items = results.map(r=>`<li${r.redBold?' class="redbold"':''}>${r.text}</li>`).join('');
    box.innerHTML = `<h2>特殊命格</h2><ol>${items}</ol>`;
  }
  return results;
}

/* ================= 宮位評分系統 ================= */
const LUCKY_ASSIST_SET = ['左輔','右弼','文昌','文曲','天魁','天鉞','祿存','天馬'];
const MALEFIC_SET = ['擎羊','陀羅','火星','鈴星','地空','地劫'];
const MAJOR_SCORE   = {'廟':4,  '旺':3,   '平':1,   '陷':-3};
const LUCKY_SCORE   = {'廟':2,  '旺':1.5, '平':0.5, '陷':-1.5};
const MALEFIC_SCORE = {'廟':0,  '旺':-0.5,'平':-1,  '陷':-2.5};
const SIHUA_SCORE   = {'祿':2, '權':1.5, '科':1, '忌':-2};

let currentScoreBase = null;   // 星曜+格局+無主星的基礎分（本命與流年共用）
let currentNatalScores = null; // 基礎分+生年四化

function patternScoreArray(results){
  const arr = new Array(12).fill(0);
  (results||[]).forEach(r=>{
    const base = r.redBold ? -3 : 4;
    (r.alloc||[]).forEach(a=>{ if(a.idx!==null && a.idx!==undefined) arr[a.idx] += base * a.w; });
  });
  return arr;
}

function computeScoreBase(cellsByZhi, patternArr){
  const base = new Array(12).fill(0);
  cellsByZhi.forEach((p,idx)=>{
    if(!p){ return; }
    const majors = (p.majorStars||[]).filter(s=>s.type==='major');
    if(majors.length===0) base[idx] -= 1; // 無主星
    const allStars = [...(p.majorStars||[]), ...(p.minorStars||[])];
    allStars.forEach(s=>{
      const b = s.brightness ? normBright(s.brightness) : null;
      if(s.type==='major'){
        if(b && MAJOR_SCORE[b]!==undefined) base[idx] += MAJOR_SCORE[b];
      }else if(LUCKY_ASSIST_SET.includes(s.name)){
        base[idx] += (b && LUCKY_SCORE[b]!==undefined) ? LUCKY_SCORE[b] : 1;
      }else if(MALEFIC_SET.includes(s.name)){
        base[idx] += (b && MALEFIC_SCORE[b]!==undefined) ? MALEFIC_SCORE[b] : -1;
      }
    });
    base[idx] += patternArr[idx];
  });
  return base;
}

function applySihuaScores(baseArr, starIndexObj, stem){
  const arr = baseArr.slice();
  const table = SIHUA_TABLE[stem] || {};
  Object.keys(table).forEach(starName=>{
    const occ = (starIndexObj[starName]||[])[0];
    if(occ) arr[occ.branchIdx] += SIHUA_SCORE[table[starName]];
  });
  return arr;
}

function scoreToStars(s){
  if(s<=-4) return 1;
  if(s<=-1) return 2;
  if(s<=2.5) return 3;
  if(s<=6) return 4;
  return 5;
}

const RADAR_DIMS = [
  {label:'命身', palaces:['命宮']},
  {label:'財富', palaces:['財帛','田宅']},
  {label:'事業', palaces:['事業','遷移']},
  {label:'情感', palaces:['夫妻','子女']},
  {label:'健康', palaces:['疾厄','福德']},
  {label:'人際', palaces:['兄弟','交友','父母']}
];

function computeDims(cellsByZhi, scores12){
  // 依「本命宮職」計算六面向（本命雷達用）
  const nameToIdx = {};
  cellsByZhi.forEach((p,idx)=>{ if(p) nameToIdx[NAME_ALIAS[p.name]||p.name] = idx; });
  return RADAR_DIMS.map(d=>{
    const vals = d.palaces.map(n=>nameToIdx[n]!==undefined ? scores12[nameToIdx[n]] : 0);
    return vals.reduce((a,b)=>a+b,0) / vals.length;
  });
}

function computeDimsByRoles(roleOfIdx, scores12){
  // 依「指定宮職對照表」計算六面向（流年宮職輪轉用）
  const nameToIdx = {};
  Object.keys(roleOfIdx).forEach(idx=>{ nameToIdx[roleOfIdx[idx]] = parseInt(idx,10); });
  return RADAR_DIMS.map(d=>{
    const vals = d.palaces.map(n=>nameToIdx[n]!==undefined ? scores12[nameToIdx[n]] : 0);
    return vals.reduce((a,b)=>a+b,0) / vals.length;
  });
}

function drawRadarInto(natalDims, flowDims, flowLabel){
  const box = document.getElementById('radarContent');
  if(!box) return;

  const N = 6, cx = 185, cy = 158, R = 108;
  const fOf = v => Math.max(0.06, Math.min(1, (v + 7) / 16));
  const pt = (i, f) => {
    const ang = -Math.PI/2 + i * 2*Math.PI/N;
    return (cx + R*f*Math.cos(ang)).toFixed(1) + ',' + (cy + R*f*Math.sin(ang)).toFixed(1);
  };

  let svg = '<svg viewBox="0 0 370 320" style="max-width:400px;width:100%;display:block;margin:0 auto;">';
  [0.25,0.5,0.75,1].forEach(f=>{
    const pts = Array.from({length:N},(_,i)=>pt(i,f)).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="#ddd" stroke-width="1"/>`;
  });
  for(let i=0;i<N;i++){
    svg += `<line x1="${cx}" y1="${cy}" x2="${pt(i,1).split(',')[0]}" y2="${pt(i,1).split(',')[1]}" stroke="#ddd" stroke-width="1"/>`;
    const [lx,ly] = pt(i,1.18).split(',');
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#333" font-weight="bold">${RADAR_DIMS[i].label}</text>`;
  }
  const natalPts = natalDims.map((v,i)=>pt(i,fOf(v))).join(' ');
  svg += `<polygon points="${natalPts}" fill="rgba(192,57,43,0.25)" stroke="#c0392b" stroke-width="2"/>`;
  if(flowDims){
    const flowPts = flowDims.map((v,i)=>pt(i,fOf(v))).join(' ');
    svg += `<polygon points="${flowPts}" fill="rgba(28,95,168,0.22)" stroke="#1c5fa8" stroke-width="2" stroke-dasharray="5,3"/>`;
  }
  svg += '</svg>';

  let legend = `<div class="radarLegend"><span class="lg lgNatal"></span>本命`;
  if(flowDims) legend += `　<span class="lg lgFlow"></span>${flowLabel||'流年'}`;
  legend += '</div>';

  let table = '<table class="radarTable"><tr><th></th>' +
    RADAR_DIMS.map(d=>`<th>${d.label}</th>`).join('') + '</tr>';
  table += '<tr><td>本命</td>' + natalDims.map(v=>`<td>${v.toFixed(1)}</td>`).join('') + '</tr>';
  if(flowDims){
    table += `<tr><td>${flowLabel||'流年'}</td>` + flowDims.map(v=>`<td>${v.toFixed(1)}</td>`).join('') + '</tr>';
  }
  table += '</table>';

  box.innerHTML = svg + legend + table +
    '<p class="radarNote">評分為本站自訂之量化參考：主星依廟旺平陷計 +4/+3/+1/−3，吉輔星 +2/+1.5/+0.5/−1.5，煞星 0/−0.5/−1/−2.5，四化 祿+2 權+1.5 科+1 忌−2，特殊命格 吉+4 凶−3（同宮全額、對宮各半、夾宮歸中宮），無主星 −1。流年採宮職輪轉制：以流年命宮重排十二宮職並計入流年四化與流年羊陀（各−1），故流年各面向讀取的宮位與本命不同。僅供參考，非傳統論命定論。</p>';
}

function renderRadar(cellsByZhi, natal12, flow12, flowLabel){
  const natalDims = computeDims(cellsByZhi, natal12);
  const flowDims = flow12 ? computeDims(cellsByZhi, flow12) : null;
  drawRadarInto(natalDims, flowDims, flowLabel);
}

function renderRadarWithRoles(cellsByZhi, natal12, flow12, flowRoleOfIdx, flowLabel){
  const natalDims = computeDims(cellsByZhi, natal12);
  const flowDims = computeDimsByRoles(flowRoleOfIdx, flow12);
  drawRadarInto(natalDims, flowDims, flowLabel);
}

// 西元年 -> 干支（西元4年為甲子年錨點）
function getYearGanZhi(year){
  const stemIdx = (((year - 4) % 10) + 10) % 10;
  const zhiIdx = (((year - 4) % 12) + 12) % 12;
  return { stem: STEM_ORDER[stemIdx], zhi: ZHI_ORDER[zhiIdx], zhiIdx };
}

// 五虎遁月訣：由流年干求正月（寅月）天干
const YUE_WU_HU_DUN = {
  '甲':'丙','己':'丙', '乙':'戊','庚':'戊', '丙':'庚','辛':'庚', '丁':'壬','壬':'壬', '戊':'甲','癸':'甲'
};
function getMonthGanzhi(yearStem, m){ // m: 1~12
  const startStemIdx = STEM_ORDER.indexOf(YUE_WU_HU_DUN[yearStem]);
  const stemIdx = (startStemIdx + m - 1) % 10;
  const branchIdx = (zhiIndex('寅') + m - 1) % 12;
  return STEM_ORDER[stemIdx] + ZHI_ORDER[branchIdx];
}

/* ---------- 農曆↔國曆轉換（使用 lunar-javascript，全域 Lunar/Solar） ---------- */
// 農曆某年某月某日 → 國曆 Date。isLeap=true 時取閏月（lunar-javascript 以負數月份表示閏月）
function lunarMD2solar(lunarYear, lunarMonth, lunarDay, isLeap){
  try{
    if(typeof Lunar === 'undefined' || !Lunar.fromYmd) return null;
    const monthArg = isLeap ? -lunarMonth : lunarMonth;
    const lunar = Lunar.fromYmd(lunarYear, monthArg, lunarDay);
    const solar = lunar.getSolar();
    return new Date(solar.getYear(), solar.getMonth()-1, solar.getDay());
  }catch(e){ return null; }
}
// 取得農曆某月天數（29或30）；isLeap 指閏月。轉不出30日即為小月29天
function lunarMonthDays(lunarYear, lunarMonth, isLeap){
  return lunarMD2solar(lunarYear, lunarMonth, 30, isLeap) ? 30 : 29;
}
// 該農曆年是否有閏月、閏第幾個月（回傳月數字，無則0）
function getLeapMonth(lunarYear){
  try{
    if(typeof LunarUtil !== 'undefined' && LunarUtil.getLeapMonth) return LunarUtil.getLeapMonth(lunarYear);
    // 退回：逐月試探哪個月存在閏月（閏月初一轉得出國曆即存在）
    for(let mm=1; mm<=12; mm++){
      if(lunarMD2solar(lunarYear, mm, 1, true)) return mm;
    }
  }catch(e){}
  return 0;
}
function fmtSolar(d){
  return d ? `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}` : '';
}
function fmtSolarShort(d){
  return d ? `${d.getMonth()+1}/${d.getDate()}` : '';
}

function computeYearFlow(year){
  if(!currentCellsByZhi){
    return '<p class="empty">請先在上方排出命盤，再查詢流年運勢。</p>';
  }
  const yGZ = getYearGanZhi(year);
  const hexagram = getYearHexagram(year);
  const sihuaEntries = SIHUA_TABLE[yGZ.stem] || {};
  const sihuaText = Object.keys(sihuaEntries).map(star=>star+'化'+sihuaEntries[star]).join('，');

  // 流年命宮：流年地支對應的命盤宮位
  const flowSoulIdx = yGZ.zhiIdx;
  const flowSoulPalace = currentCellsByZhi[flowSoulIdx];
  const flowSoulName = flowSoulPalace ? (NAME_ALIAS[flowSoulPalace.name]||flowSoulPalace.name) : '?';

  // 流月：流年命宮起正月，順行十二宮
  const monthPalaceIdx = m => (flowSoulIdx + (m-1)) % 12;

  // 找出四化星在命盤中的固定宮位
  const starIndex = buildStarIndex(currentCellsByZhi);
  const starHitMonths = {}; // starName -> monthNumber
  Object.keys(sihuaEntries).forEach(starName=>{
    const occ = (starIndex[starName]||[])[0];
    if(!occ) return;
    // 反推是第幾個流月命中這個宮位地支
    const m = (((occ.branchIdx - flowSoulIdx) % 12) + 12) % 12 + 1;
    starHitMonths[starName] = m;
  });

  // 農曆月名（正月~臘月）
  const LUNAR_MONTH_NAME = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','臘月'];
  const lunarYearNum = year;
  const leapMonth = getLeapMonth(lunarYearNum); // 該農曆年閏第幾月，無則0

  // 每個流月（1~12）對應的實際農曆月起訖國曆日；閏月併入對應的本月（同一宮位、日期展開兩段）
  // segsOfMonth[m] = [{isLeap, startD, endD, days}...]（閏月的月會有兩段）
  const segsOfMonth = {};
  for(let m=1; m<=12; m++){
    const segs = [];
    // 本月（平月）
    const s1 = lunarMD2solar(lunarYearNum, m, 1, false);
    const d1 = lunarMonthDays(lunarYearNum, m, false);
    if(s1) segs.push({isLeap:false, startD:s1, days:d1});
    // 若本月後面跟著閏月，閏月併入本格
    if(leapMonth===m){
      const s2 = lunarMD2solar(lunarYearNum, m, 1, true);
      const d2 = lunarMonthDays(lunarYearNum, m, true);
      if(s2) segs.push({isLeap:true, startD:s2, days:d2});
    }
    // 補每段的 endD
    segs.forEach(seg=>{
      const last = lunarMD2solar(lunarYearNum, m, seg.days, seg.isLeap);
      seg.endD = last || (seg.startD ? new Date(seg.startD.getTime()+(seg.days-1)*86400000) : null);
    });
    segsOfMonth[m] = segs;
  }

  // 組出12個月卡片
  let monthCards = '';
  for(let m=1; m<=12; m++){
    const pIdx = monthPalaceIdx(m);
    const p = currentCellsByZhi[pIdx];
    const pName = p ? (NAME_ALIAS[p.name]||p.name) : '?';
    const monthGZ = getMonthGanzhi(yGZ.stem, m);
    const segs = segsOfMonth[m] || [];
    const hasLeap = segs.some(s=>s.isLeap);

    // 國曆起訖：從第一段起點到最後一段終點
    let rangeText = '';
    if(segs.length && segs[0].startD && segs[segs.length-1].endD){
      rangeText = `${fmtSolarShort(segs[0].startD)}–${fmtSolarShort(segs[segs.length-1].endD)}`;
    }

    // 流月命中
    const hitStars = Object.keys(starHitMonths).filter(s=>starHitMonths[s]===m);
    const isHit = hitStars.length>0;
    const hitTags = hitStars.map(s=>`<span class="sihua ${sihuaEntries[s]}">${sihuaEntries[s]}</span>`).join('');

    // 流日：每顆化星回到本宮的農曆日序（初X、十X、廿X），逐段轉國曆
    // 小月30日修正為29日（該月最後一天）；閏月段各自展開一輪
    const dayParts = [];
    Object.keys(sihuaEntries).forEach(starName=>{
      const occ = (starIndex[starName]||[])[0];
      if(!occ) return;
      const offset = (((occ.branchIdx - pIdx) % 12) + 12) % 12;
      const dayNums = [];
      for(let base=0; base<3; base++){
        const dn = offset + 1 + base*12;
        if(dn<=30) dayNums.push(dn);
      }
      const solarDays = [];
      segs.forEach(seg=>{
        dayNums.forEach(dn=>{
          const dayFixed = Math.min(dn, seg.days); // 小月無30日→取該月最後一天
          const sd = lunarMD2solar(lunarYearNum, m, dayFixed, seg.isLeap);
          if(sd) solarDays.push((seg.isLeap?'閏':'')+fmtSolarShort(sd));
        });
      });
      if(solarDays.length)
        dayParts.push(`<span class="sihua ${sihuaEntries[starName]}">${sihuaEntries[starName]}</span>${starName}：${solarDays.join('、')}`);
    });
    const dayHtml = dayParts.length ? `<div class="mDays">${dayParts.join('<br>')}</div>` : '';

    // 本月宮位內入廟/旺/陷的星曜分布
    let brightHtml = '';
    if(p){
      const palaceStars = [...(p.majorStars||[]), ...(p.minorStars||[])];
      const buckets = {'廟':[],'旺':[],'陷':[]};
      palaceStars.forEach(s=>{
        const b = normBright(s.brightness);
        if(buckets[b]) buckets[b].push(s.name);
      });
      const brightParts = [];
      if(buckets['廟'].length) brightParts.push(`<span class="bMiao">廟</span>${buckets['廟'].join('、')}`);
      if(buckets['旺'].length) brightParts.push(`<span class="bWang">旺</span>${buckets['旺'].join('、')}`);
      if(buckets['陷'].length) brightParts.push(`<span class="bXian">陷</span>${buckets['陷'].join('、')}`);
      if(brightParts.length) brightHtml = `<div class="mBright">${brightParts.join('　')}</div>`;
    }

    const leapTag = hasLeap ? `<span class="leapTag">含閏${LUNAR_MONTH_NAME[m-1]}</span>` : '';
    monthCards += `<div class="monthCard${isHit?' hit':''}">
      <div class="mTitle">${LUNAR_MONTH_NAME[m-1]}（${monthGZ}）${leapTag}${hitTags}${isHit?`<span class="mHitTag">流月四化命中</span>`:''}</div>
      <div class="mSub">${rangeText||('第'+m+'月')}　宮位：${p?p.heavenlyStem+p.earthlyBranch:''}【${pName}】</div>
      ${brightHtml}
      ${dayHtml}
    </div>`;
  }

  // ---------- 通用年度簡述（值年卦＋流年四化，人人相同） ----------
  const hexEssence = HEX_MEANING[hexagram.name] || '';
  const stemMeaning = STEM_SIHUA_MEANING[yGZ.stem] || '';
  const hexLine = `${year}年歲次${yGZ.stem}${yGZ.zhi}，皇極經世值年卦為「${hexagram.full}」：${hexEssence}。`;
  // 四化釋義依「；」切分，每一化獨立一行方便閱讀
  const sihuaLines = stemMeaning.split('；').filter(s=>s.trim())
    .map(s=>`<div class="pLine">${s}${s.endsWith('。')?'':'。'}</div>`).join('');

  // ---------- 個人化判讀：流年四化入命盤宮位 + 大限小限 ----------
  let personalHtml = '';
  {
    const lines = [];
    // 大限、小限（以虛歲計）
    if(currentMeta && currentMeta.birthYear && year>=currentMeta.birthYear){
      const age = year - currentMeta.birthYear + 1; // 虛歲
      let decadalPalace = null;
      currentCellsByZhi.forEach(p=>{
        if(p && p.decadal && p.decadal.range && age>=p.decadal.range[0] && age<=p.decadal.range[1]) decadalPalace = p;
      });
      let smallPalace = null;
      if(currentMeta.smallLimitMap){
        Object.keys(currentMeta.smallLimitMap).forEach(idx=>{
          if(currentMeta.smallLimitMap[idx].includes(age)) smallPalace = currentCellsByZhi[idx];
        });
      }
      const dName = decadalPalace ? (NAME_ALIAS[decadalPalace.name]||decadalPalace.name) : null;
      const sName = smallPalace ? (NAME_ALIAS[smallPalace.name]||smallPalace.name) : null;
      let limitLine = `本年虛歲 <b>${age}</b> 歲`;
      if(dName) limitLine += `，行 <b>${decadalPalace.decadal.range[0]}-${decadalPalace.decadal.range[1]}</b> 大限【<b>${dName}</b>】，此十年重心所在`;
      if(sName) limitLine += `；小限入【<b>${sName}</b>】，本年氣運聚焦之處`;
      lines.push(limitLine + '。');
    }
    // 四化入宮
    ['祿','權','科','忌'].forEach(type=>{
      const starName = Object.keys(sihuaEntries).find(k=>sihuaEntries[k]===type);
      if(!starName) return;
      const occ = (starIndex[starName]||[])[0];
      if(!occ){
        lines.push(`流年${starName}化${type}：此星未列於盤面（視盤而定之星），略過判讀。`);
        return;
      }
      const domain = PALACE_DOMAIN[occ.palaceName] || occ.palaceName;
      const reading = HUA_READING[type](domain);
      lines.push(`流年<b>${starName}化${type}</b>入【<b>${occ.palaceName}</b>】：${reading}`);
    });
    personalHtml = lines.map(l=>`<div class="pLine">${l}</div>`).join('');
  }

  // ---------- 流年宮位評分（宮職輪轉制）→ 更新雷達圖 ----------
  // 基礎分（星曜+格局+無主星）跟宮位不動；加流年四化；加流年羊陀；
  // 六大面向依「流年宮職」讀取：從流年命宮起，比照本命宮職排列方向輪轉
  if(currentScoreBase && currentNatalScores){
    const flowScores = applySihuaScores(currentScoreBase, starIndex, yGZ.stem);

    // 流年羊陀：依流年干定流年祿存位，祿前一宮流年擎羊(-1)、祿後一宮流年陀羅(-1)
    const LUCUN_POS = {'甲':'寅','乙':'卯','丙':'巳','丁':'午','戊':'巳','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子'};
    const lucunIdx = zhiIndex(LUCUN_POS[yGZ.stem]);
    if(lucunIdx>=0){
      flowScores[(lucunIdx+1)%12] -= 1;
      flowScores[((lucunIdx-1)%12+12)%12] -= 1;
    }

    // 宮職輪轉：本命盤宮職沿地支索引遞減方向排列（命宮s、兄弟s-1、夫妻s-2…），流年比照
    const flowRoleOfIdx = {};
    for(let k=0;k<12;k++){
      const idx = ((flowSoulIdx - k) % 12 + 12) % 12;
      flowRoleOfIdx[idx] = PALACE_ORDER[k];
    }
    renderRadarWithRoles(currentCellsByZhi, currentNatalScores, flowScores, flowRoleOfIdx, year+'流年');
  }

  return `
    <div class="yfSummary">
      <div>流年干支：<b>${yGZ.stem}${yGZ.zhi}</b>（西元${year}年）</div>
      <div>流年四化：<b>${sihuaText}</b></div>
      <div>皇極經世值年卦：<b>${hexagram.full}卦</b></div>
      <div>流年命宮：<b>${flowSoulPalace?flowSoulPalace.heavenlyStem+flowSoulPalace.earthlyBranch:''}【${flowSoulName}】</b></div>
      <div>本流年（${yGZ.stem}${yGZ.zhi}年）期間：<b>${
        (segsOfMonth[1] && segsOfMonth[1][0] && segsOfMonth[12] && segsOfMonth[12].length)
          ? fmtSolar(segsOfMonth[1][0].startD)+'　~　'+fmtSolar(segsOfMonth[12][segsOfMonth[12].length-1].endD)
          : '（農曆轉換載入中）'
      }</b>（農曆正月初一至隔年除夕，共十二個農曆月${leapMonth?('，含閏'+LUNAR_MONTH_NAME[leapMonth-1]):''}）</div>
      <div style="color:#1c5fa8;">六大面向能量圖已疊加本年流年（藍色虛線），請見上方雷達圖。</div>
    </div>
    <div class="yfTextBox">
      <div class="yfTextTitle">年度總論（通用，不因命盤而異）</div>
      <div class="pLine">${hexLine}</div>
      ${sihuaLines}
    </div>
    <div class="yfTextBox">
      <div class="yfTextTitle">流年四化入命盤判讀（個人參考）</div>
      ${personalHtml}
    </div>
    <div class="monthGrid">${monthCards}</div>
    <p style="color:#999;font-size:12px;margin-top:12px;">
      說明：流月採「流年命宮起正月，順行十二宮」排列，卡片標題為該農曆月對應的國曆日期區間；
      流日以每月宮位為初一順行十二宮推算，日期已換算為國曆。農曆與國曆轉換採 lunar-javascript。
    </p>
  `;
}

document.getElementById('yfBtn').addEventListener('click', ()=>{
  const year = parseInt(document.getElementById('yfYearInput').value, 10);
  const box = document.getElementById('yfResult');
  if(!year){ box.innerHTML = '<p class="empty">請輸入正確的西元年份。</p>'; return; }
  box.innerHTML = computeYearFlow(year);
});

</script>
</body>
</html>
